<div class="row justify-content-start" class.mb-3="{!$inset}">
    <label if="$label" for="$id" class="col-form-label">$label</label>
    <div class="$wrapperClass input-group">
        <textarea if="$textarea" #input (input)="onInput" type="$type" rows="$rows" cols="$cols"
            placeholder="$placeholder" autocomplete="$autocomplete" class="$inputClass form-control"
            class.is-invalid="$isInvalid" id="$id" name="$name" model="$model" readonly="$readonly"></textarea>
        <input else #input (input)="onInput" type="{$revealable && $revealed ? 'text' : $type}"
            placeholder="$placeholder" autocomplete="$autocomplete"
            class="$inputClass form-control" class.is-invalid="$isInvalid" id="$id" readonly="$readonly" name="$name"
            model="$model">
        <button if="$revealable" type="button" tabindex="-1" class="btn btn-outline-secondary" (click)="toggleReveal"
            aria-label="{$revealed ? 'Hide' : 'Show'}">
            <Icon name="{$revealed ? 'bi-eye-slash' : 'bi-eye'}" />
        </button>
        <button if="$copyable" type="button" tabindex="-1" class="btn btn-outline-secondary" (click)="copyValue"
            aria-label="Copy">
            <Icon name="{$copied ? 'bi-clipboard-check' : 'bi-clipboard'}" />
        </button>
        <button if="$clearable" type="button" class="btn btn-outline-secondary" (click)="clear">
            <Icon name="bi-x" />
        </button>
    </div>
    <ValidationMessage #validationMessages />
    <div if="$hint" class="form-text">$hint</div>
    <slot></slot>
</div>
